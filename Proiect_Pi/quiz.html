<!DOCTYPE html>
<html>
<head>
    <title>Quiz Pisici</title>
    <link rel="icon" type="image/png" href="poza1.png">
    <style>
    
        * {
            text-decoration: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e7dfd8;
            font-family: 'Times New Roman', serif;
        }

        .navbar {
            background: #ffbd59; 
            border-radius: 10px; 
            font-family: calibri; 
            padding: 10px 15px;
            margin: 10px;
        }

        .navdiv {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }

        .logo a {
            font-size: 50px; 
            font-weight: 700; 
            color: black;
        }

        li {
            list-style: none;
            display: inline-block;
        }

        li a {
            color: black; 
            font-size: 25px; 
            font-family: 'Times New Roman';
            font-weight: bold; 
            margin-right: 40px;
        }

        .titlu-pagina {
            text-align: center;
            margin-top: 50px;
            font-size: 45px;
        }

        .container-quizuri {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px; 
            margin-top: 60px;
            flex-wrap: wrap; 
            padding-bottom: 50px;
        }

        .card-quiz {
            background-color: #ffbd59;
            width: 380px;
            height: 460px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-quiz:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .label-quiz {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        .imagine-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .imagine-container img {
            max-width: 260px;
            height: auto;
            object-fit: contain;
        }

        .buton-quiz {
            width: 180px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background-color: #ffe7c2;
            font-weight: bold;
            font-size: 18px;
            font-family: Calibri, sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .buton-quiz:hover {
            background-color: #ffffff;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">Pisici</a> </div>
            <ul>
                <li><a href="proiect.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="robot.html">Robot</a></li>
                <li><a href="cont.html">Cont</a></li>
            </ul>
        </div>
    </nav>

    <h1 class="titlu-pagina">Alege un Quiz ₍^. .^₎Ⳋ </h1>

    <div class="container-quizuri">
    <div class="card-quiz">
        <h2 class="label-quiz">Ce tip de pisică ai?</h2>
        <div class="imagine-container">
            <img src="poza27.png" alt="Quiz 1">
        </div>
        <button class="buton-quiz buton-quiz1">Incepe quiz-ul</button>
    </div>

    <div class="card-quiz">
        <h2 class="label-quiz">Ce pisică ți se potrivește?</h2>
        <div class="imagine-container">
            <img src="poza26.png" alt="Quiz 2">
        </div>
        <button class="buton-quiz buton-quiz2">Incepe quiz-ul</button>
    </div>
</div>
    <script src="quiz.js"></script>

</body>
</html>
