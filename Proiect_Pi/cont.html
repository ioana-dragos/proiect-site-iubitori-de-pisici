<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Cont</title>
    <link rel="icon" type="image/png" href="poza1.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            background-color: #e7dfd8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: #ffbd59; 
            border-radius: 10px; 
            font-family: calibri; 
            padding: 10px 40px;
            margin: 10px; 
        }

        .navdiv {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }

        .logo a {
            font-family: 'Times New Roman';
            font-size: 50px; 
            font-weight: 700; 
            color: black;
        }

        li {
            list-style: none;
            display: inline-block;
        }

        li a {
            color: black; 
            font-size: 25px; 
            font-family: 'Times New Roman';
            font-weight: bold; 
            margin-left: 30px;
        }

        .centru {
            background-color: #ffbd59; 
            width: 560px;
            height: auto;
            min-height: 500px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
            
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
        }


        .bloc2Centru {
            background-color: #fff6c9;
            width: 100%;
            min-height: 460px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            position: relative;
        }

        .dreptunghiText {
            width: 200px;
            height: 45px;        
            display: flex;    
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background-color: #ffbd59;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .poza {
            position: absolute;
            right: 20px;
            top: 80px;
            width: 180px;
        }

        .formular {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
            width: 100%;
            padding-left: 40px; 
        }

        .label-nume {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .input-camp {
            width: 250px;
            height: 35px;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .buton-register {
            width: 180px;
            height: 40px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #ffbd59;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .label-conecteaza-te {
            margin-top: auto; 
            padding-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .buton-login {
            width: 150px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background-color: #ffbd59;
            font-weight: bold;
            cursor: pointer;
            margin: 10px auto; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .buton-login a {
            color: black;
            text-decoration: none;
            font-size: 16px;
        }
        .ascuns {
            display: none !important;
        }

        .container-cont {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">Pisici</a> </div>
            <ul>
                <li><a href="proiect.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="robot.html">Robot</a></li>
                <li><a href="cont.html">Cont</a></li>
            </ul>
        </div>
    </nav>

    <div class="centru">
        <div class="bloc2Centru">
            <div class="dreptunghiText">CONT</div>
            
            <img src="poza29.png" class="poza" alt="Pusheen la laptop">
            <div id="fereastra-cont" class="container-cont">
            <form class="formular">
                <label class="label-nume">Nume:</label>
                <input type="text" id="nume" class="input-camp" placeholder="Scrie numele">

                <label class="label-nume">Email:</label>
                <input type="email" id="email" class="input-camp" placeholder="Scrie email-ul">

                <label class="label-nume">Parolă:</label>
                <input type="password" id="parola" class="input-camp" placeholder="Scrie parola">

                <button type="button" class="buton-register">Inregistreaza-te</button>
            </form>

            <label class="label-conecteaza-te">Ai deja un cont?</label>
            <button class="buton-login"><a href="conectare.html">Conecteaza-te</a></button>
        </div>

        <div id="fereastra-conectat" class="container-cont ascuns">
             <form class="formular">

                <label class="label-nume">Nume:</label>
                <input type="text" id="nume-logat" class="input-camp" value="" placeholder="Nume">
                
                <label class="label-nume">Email-ul tău:</label>
                <input type="text" id="email-logat" class="input-camp" value="" placeholder="Email">

                <label class="label-nume">Parola nouă</label>
                <input type="password" id="parola-logat" class="input-camp" value="" placeholder="Scrie parola nouă">
                
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button type="button" id="buton-modifica" class="buton-register" style="width: 50%;">Salvează</button>
                    <button type="button" id="buton-logout" class="buton-register" style="background-color: #ff8c59; width: 50%;">Deconectare</button>
                </div>

                </form>
        </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
