<!DOCTYPE html>
<html>

<head>

    <title>Robot</title>
    <link rel="icon" type="image/png" href="poza1.png">
    <style>
        *{
            text-decoration: none;
        }
        .navbar{
            background: #ffbd59; 
             border-radius: 10px; 
            font-family: calibri; 
            padding-right: 15px;
            padding-left: 15px;
        }
        .navdiv{
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .logo a{
            font-family: 'Times New Roman';
            font-size: 50px; 
            font-weight: 700; 
            color: black;
        }
        li{
            list-style: none;
            display: inline-block;
        }
        li a{
            color: black; 
            font-size: 25px; 
            font-family: 'Times New Roman';
            font-weight: bold; 
            margin-right: 40px;
        }
        .chat-container{
            width: 600px;
            background-color: white;
            margin: 40px auto;
            border-radius: 20px;
            padding: 20px;
            border: 4px solid #e7dfd8;
        }
        .titluChat{
            text-align: center;
            color: #ffbd59;
            font-family: 'Times New Roman';
            font-size: 30px;
            margin-top: 0;
        }
        .zonaMesaje{
            height: 400px;
            overflow-y: auto;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fff6c9;
            border-radius: 10px;
        }
        .input-zona{
            display: flex;
            gap: 10px;
        }

        #mesaj-user{
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: 2px solid #ddd;
            font-size: 16px;
            outline: none;
        }

        #btn-trimite{
            background-color: #ffbd59;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        #btn-trimite:hover{
            background-color: #ffbd59;
        }
        .mesaj{
            padding: 12px 20px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 18px;
            line-height: 1.4;
            font-family: calibri;
        }
        .mesaj-user {
            align-self: flex-end; 
            background-color: #ffbd59;
            color: black;
            border-bottom-right-radius: 5px;
        }
        .mesaj-robot {
            white-space: pre-line;
            align-self: flex-start;
            background-color: #e0e0e0;
            color: black;
            border-bottom-left-radius: 5px;
        }
    </style>
<style>
     body {
            background-color: #e7dfd8;
        }
</style>
</head>


<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">Pisici</a> </div>
            <ul>
                    <li><a href="proiect.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="quiz.html">Quiz</a></li>
                    <li><a href="robot.html">Robot</a></li>
                    <li><a href="cont.html">Cont</a></li>
            </ul>
        </div>
    </nav>

    <div class="chat-container">

        <h2 class="titluChat">Intreaba Expertul Veterinar 🐱🩺</h2>

        <div id="zonaMesaje" class="zonaMesaje">
            <div class="mesaj mesaj-robot">Salut! Sunt asistentul tau veterinar virtual. Cu ce te pot ajuta legat de pisica ta?</div>
        </div>
        <div class="input-zona">
                <input type="text" id="mesaj-user" placeholder="Scrie intrebarea aici...">
                <button id="btn-trimite">Trimite</button>
            </div>
    </div>
    <script src="robot.js"></script>
</body>

</html>
